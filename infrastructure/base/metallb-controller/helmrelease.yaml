apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: homelab
spec:
  chart:
    spec:
      chart: metallb
      sourceRef:
        kind: HelmRepository
        name: metallb
      #version: "6.4.x"
      interval: 24h
  releaseName: metallb
  interval: 24h
  values:
    prometheus:
      serviceMonitor:
        enabled: false
    frr-k8s:
      prometheus:
        serviceMonitor:
          enabled: false
    controller:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 512Mi
