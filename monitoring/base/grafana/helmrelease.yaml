apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: homelab
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: homelab
      version: "12.3.3"
      interval: 10m
  values:
    initChownData:
      enabled: false
    adminUser: admin
    adminPassword: changeme
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
    persistence:
      enabled: true
      size: 5Gi
    service:
      type: ClusterIP
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            orgId: 1
            url: http://victoria-metrics-victoria-metrics-single-server:8428
            isDefault: true
            access: proxy
          - name: Loki
            type: loki
            orgId: 1
            url: http://loki.homelab.svc.cluster.local:3100
            access: proxy
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default:
        node-exporter:
          gnetId: 1860
          revision: 1
          datasource:
            name: VictoriaMetrics
        kubernetes-cluster:
          gnetId: 315
          revision: 1
          datasource:
            name: VictoriaMetrics
        postgresql-overview:
          gnetId: 9628
          revision: 1
          datasource:
            name: VictoriaMetrics
