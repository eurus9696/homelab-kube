apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: homelab
spec:
  interval: 10m
  chart:
    spec:
      chart: loki
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-loki
        namespace: homelab
  values:
    deploymentMode: Monolithic
    singleBinary:
      replicas: 1
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 512Mi
      persistence:
        enabled: true
        size: 5Gi
    loki:
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v12
            index:
              prefix: loki_index_
              period: 24h
      storage:
        type: filesystem
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    canary:
      enabled: false
    gateway:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
    test:
      enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: homelab
spec:
  interval: 10m
  chart:
    spec:
      chart: promtail
      version: "6.6.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-loki
        namespace: homelab
  values:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
