apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: databases
spec:
  interval: 10m
  chart:
    spec:
      chart: postgresql
      version: "16.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: homelab
  values:
    image:
      repository: pgvector/pgvector
      tag: "16"
      digest: "sha256:REPLACE_ME"
    auth:
      existingSecret: postgres-secret
    primary:
      persistence:
        enabled: true
        size: 10Gi
        storageClass: local-path
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      service:
        type: ClusterIP
        ports:
          postgresql: 5432
