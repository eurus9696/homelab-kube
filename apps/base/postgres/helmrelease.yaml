apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: databases
spec:
  interval: 10m
  chart:
    spec:
      chart: postgresql
      version: "16.7.27"
      sourceRef:
        kind: HelmRepository
        name: bitnami
  values:
    image:
      repository: pgvector/pgvector
      tag: "pg16"
      digest: "sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc"
    auth:
      existingSecret: postgres-secret
    primary:
      persistence:
        enabled: true
        size: 10Gi
        storageClass: local-path
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      service:
        type: ClusterIP
        ports:
          postgresql: 5432
