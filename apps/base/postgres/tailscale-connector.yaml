apiVersion: v1
kind: Service
metadata:
  name: postgres-tailscale
  namespace: databases
  annotations:
    tailscale.com/tailnet-fqdn: "postgres."
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: postgres
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
